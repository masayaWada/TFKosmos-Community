name: Lint and Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# rust-cache の復元不整合時は RUST_CACHE_BUST を v2, v3… と上げて新しいキャッシュ名前空間にする
env:
  RUST_CACHE_BUST: v1

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      # Rust 専用キャッシュ（@v2.7.5 固定・prefix でバスト可能）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: backend
          prefix-key: lint-${{ env.RUST_CACHE_BUST }}
          key: ${{ hashFiles('backend/Cargo.lock') }}

      - name: Check formatting
        run: cd backend && cargo fmt --all -- --check

      - name: Run Clippy (all features)
        run: cd backend && cargo clippy --all-targets --all-features -- -D warnings

      - name: Check Community Edition compiles
        run: cd backend && cargo check --no-default-features --features community

      - name: Check Pro Edition compiles
        run: cd backend && cargo check --no-default-features --features pro

      - name: Clippy Community Edition
        run: cd backend && cargo clippy --no-default-features --features community -- -D warnings

      - name: Clippy Community Edition (tests)
        run: cd backend && cargo clippy --no-default-features --features community --tests -- -D warnings

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

      - name: Check TypeScript types
        run: cd frontend && npm run typecheck
