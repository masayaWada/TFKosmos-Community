name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_CACHE_BUST: v1

jobs:
  backend-tests:
    name: Backend Tests (Community)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: backend
          prefix-key: test-community-${{ env.RUST_CACHE_BUST }}
          key: ${{ hashFiles('backend/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run backend tests
        run: cd backend && cargo test --no-default-features --features community --verbose

      - name: Generate backend coverage
        run: |
          cd backend && cargo llvm-cov --no-default-features --features community --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex 'real_.*_client\.rs|real_azure_client\.rs|client_factory\.rs|main\.rs'

      - name: Check backend coverage threshold (80%)
        run: |
          cd backend && cargo llvm-cov --no-default-features --features community --workspace --fail-under-lines 80 \
            --ignore-filename-regex 'real_.*_client\.rs|real_azure_client\.rs|client_factory\.rs|main\.rs'

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
