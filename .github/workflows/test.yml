name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # rust-cache 破損・不整合時は v2, v3… に上げてキャッシュを切り替える
  RUST_CACHE_BUST: v1

jobs:
  backend-tests:
    name: Backend Tests (${{ matrix.edition }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [community, pro, enterprise]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: backend
          prefix-key: test-${{ matrix.edition }}-${{ env.RUST_CACHE_BUST }}
          key: ${{ hashFiles('backend/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        if: matrix.edition == 'enterprise'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run backend tests
        run: cd backend && cargo test --no-default-features --features ${{ matrix.edition }} --verbose

      - name: Generate backend coverage
        if: matrix.edition == 'enterprise'
        run: |
          cd backend && cargo llvm-cov --no-default-features --features enterprise --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex 'real_.*_client\.rs|real_azure_client\.rs|client_factory\.rs|main\.rs'

      - name: Check backend coverage threshold (80%)
        if: matrix.edition == 'enterprise'
        run: |
          cd backend && cargo llvm-cov --no-default-features --features enterprise --workspace --fail-under-lines 80 \
            --ignore-filename-regex 'real_.*_client\.rs|real_azure_client\.rs|client_factory\.rs|main\.rs'

      - name: Upload backend coverage to Codecov
        if: matrix.edition == 'enterprise'
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:run

      - name: Generate frontend coverage
        run: cd frontend && npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
