name: Release Community Edition

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

  build-community:
    needs: validate
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: tfkosmos-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: tfkosmos-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: tfkosmos-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tfkosmos-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Community Edition (CLI only)
        working-directory: backend
        run: |
          cargo build --release --no-default-features --features community --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp backend/target/${{ matrix.target }}/release/tfkosmos.exe ${{ matrix.artifact }}
          else
            cp backend/target/${{ matrix.target }}/release/tfkosmos ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    needs: build-community
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "TFKosmos Community ${{ env.RELEASE_VERSION }}"
          body: |
            ## TFKosmos Community Edition ${{ env.RELEASE_VERSION }}

            CLI-only release for single-account scanning and Terraform code generation.

            ### Downloads
            - **Linux (x86_64)**: `tfkosmos-linux-x86_64`
            - **macOS (ARM64)**: `tfkosmos-macos-arm64`
            - **macOS (x86_64)**: `tfkosmos-macos-x86_64`
            - **Windows (x86_64)**: `tfkosmos-windows-x86_64.exe`

            ### Usage
            ```bash
            tfkosmos scan --config scan-config.toml
            tfkosmos generate --scan-id <scan-id>
            tfkosmos drift --scan-id <scan-id> --state-file terraform.tfstate
            ```
          draft: true
          files: |
            artifacts/**/*
